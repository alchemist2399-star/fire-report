  [STEP 1] CSS 추가

<style id="debug-css-patch">
/* ── 디버그 패널 스타일 ── */
.dbg-panel{background:var(--surface);border:1.5px solid rgba(124,58,237,0.3);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.dbg-toolbar{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#1a1a2e;flex-wrap:wrap;}
.dbg-filter-btn{padding:5px 10px;border-radius:100px;border:none;font-size:11px;font-weight:800;cursor:pointer;font-family:var(--font);background:var(--surface2);color:var(--ink3);transition:all .15s;}
.dbg-log-wrap{max-height:360px;overflow-y:auto;background:#0d0d1a;}
.dbg-status-dot{width:8px;height:8px;border-radius:50%;background:#28c840;flex-shrink:0;box-shadow:0 0 6px rgba(40,200,64,0.6);}
.dbg-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:3px;background:rgba(124,58,237,0.25);color:#c4b5fd;letter-spacing:0.5px;}

    <button onclick="_debug.clear()" style="padding:5px 10px;border-radius:100px;border:none;font-size:11px;font-weight:800;cursor:pointer;background:rgba(217,48,37,0.3);color:#ff8888;font-family:var(--font);">🗑️ 지우기</button>

  <!-- 요약 바 -->

<!--
  ──────────────────────────────────────────────────────────────
  [STEP 3] JavaScript — _debug 모듈
  위치: <script> 태그 맨 위, 'use strict'; 바로 다음 줄에 추가
  ──────────────────────────────────────────────────────────────
-->
<script id="debug-js-patch">
/* ═══ 🛠️ DEBUG MODULE ═══════════════════════════════════════════
   보안 원칙:
   · API Key / 비밀번호 절대 로깅 금지 (자동 마스킹)
   · 설정 탭 비밀번호 인증 후에만 패널 진입
   · 로그는 메모리에만 저장, 외부 전송 없음
   · 앱 잠금 시 자동 초기화
═══════════════════════════════════════════════════════════════ */
var _debug = {
  _logs : [],
  MAX   : 200,

  /* 로그 기록 */
  log: function(module, step, status, detail) {
    try {
      var n = new Date();
      var t = [n.getHours(), n.getMinutes(), n.getSeconds()]
               .map(function(v){ return String(v).padStart(2,'0'); }).join(':') + '.' +
               String(n.getMilliseconds()).padStart(3,'0');
      var entry = {
        time:t, module:String(module||'').slice(0,20),
        step:String(step||'').slice(0,50), status:status,
        detail:this._mask(String(detail||'')).slice(0,200)
      };
      this._logs.unshift(entry);
      if (this._logs.length > this.MAX) this._logs.pop();
      var icon = {ok:'✅',err:'❌',warn:'⚠️',info:'🔵'}[status]||'▪';
      console.log('[DBG]['+module+'] '+icon+' '+step+(detail?' — '+this._mask(String(detail)):''));
      this._render(); this._updateCounts();
    } catch(e){}
  },
  ok  :function(m,s,d){this.log(m,s,'ok',d);},
  err :function(m,s,d){this.log(m,s,'err',d);},
  warn:function(m,s,d){this.log(m,s,'warn',d);},
  info:function(m,s,d){this.log(m,s,'info',d);},

  /* 민감 정보 마스킹 */
  _mask:function(s){
    return s.replace(/AIza[A-Za-z0-9_\-]{10,}/g,'AIza***[MASKED]')
            .replace(/"?(password|pw|secret|token)"?\s*:\s*"[^"]+"/gi,'"$1":"[MASKED]"');
  },

  /* 패널 토글 */
  _open:false,
  toggle:function(){
    this._open=!this._open;
    var p=document.getElementById('debugPanel');
    if(p) p.style.display=this._open?'block':'none';
    if(this._open){this._render();this._updateCounts();}
  },

  /* 로그 초기화 */
  clear:function(){
    this._logs=[];
    this._render();this._updateCounts();
    this.info('Debug','로그 초기화됨');
  },

  /* 카운트 업데이트 */
  _updateCounts:function(){
    try{
      var ok=0,err=0,warn=0;
      this._logs.forEach(function(e){
        if(e.status==='ok')ok++;
        else if(e.status==='err')err++;
        else if(e.status==='warn')warn++;
      });
      var s=function(id,v){var el=document.getElementById(id);if(el)el.textContent=v;};
      s('dbg_okCount','✅ 성공 '+ok);
      s('dbg_errCount','❌ 오류 '+err);
      s('dbg_warnCount','⚠️ 경고 '+warn);
      s('dbg_totalCount','총 '+this._logs.length+'건');
    }catch(e){}
  },

  /* 필터 */
  _filter:'all',
  setFilter:function(f){
    this._filter=f;
    document.querySelectorAll('.dbg-filter-btn').forEach(function(b){
      b.style.background=b.dataset.filter===f?'var(--navy)':'var(--surface2)';
      b.style.color=b.dataset.filter===f?'#fff':'var(--ink3)';
    });
    this._render();
  },

  /* 렌더링 */
  _render:function(){
    try{
      var wrap=document.getElementById('debugLogContainer');
      if(!wrap) return;
      var f=this._filter;
      var filtered=f==='all'?this._logs:this._logs.filter(function(e){return e.status===f;});
      if(!filtered.length){
        wrap.innerHTML='<div style="padding:14px;text-align:center;color:#555;font-size:11px;">'+(f==='all'?'아직 기록이 없습니다':'해당 로그 없음')+'</div>';
        return;
      }
      var BG  ={ok:'rgba(13,155,106,0.08)',err:'rgba(217,48,37,0.08)',warn:'rgba(133,100,4,0.08)',info:'rgba(26,110,232,0.08)'};
      var CLR ={ok:'#4ade80',err:'#f87171',warn:'#fbbf24',info:'#60a5fa'};
      var ICO ={ok:'✅',err:'❌',warn:'⚠️',info:'🔵'};
      wrap.innerHTML=filtered.map(function(e){
        var bg=BG[e.status]||'transparent';
        var c=CLR[e.status]||'#9CA3AF';
        var i=ICO[e.status]||'▪';
        return '<div style="display:flex;gap:8px;padding:7px 10px;border-bottom:1px solid #1a1a2e;background:'+bg+';align-items:flex-start;">'+
          '<span style="font-size:11px;flex-shrink:0;margin-top:1px;">'+i+'</span>'+
          '<div style="flex:1;min-width:0;">'+
            '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">'+
              '<span style="font-size:10px;font-weight:900;color:'+c+';">['+e.module+']</span>'+
              '<span style="font-size:10px;font-weight:700;color:#d1d5db;">'+e.step+'</span>'+
              '<span style="font-size:9px;color:#6B7280;margin-left:auto;font-family:monospace;flex-shrink:0;">'+e.time+'</span>'+
            '</div>'+
            (e.detail?'<div style="font-size:10px;color:#9CA3AF;font-family:monospace;word-break:break-all;margin-top:2px;">'+e.detail+'</div>':'')+'</div></div>';
      }).join('');
    }catch(e){}
  },

  /* 로그 복사 */
  copyLogs:async function(){
    try{
      var text=this._logs.map(function(e){
        return '['+e.time+']['+e.module+'] '+e.step+(e.detail?' — '+e.detail:'');
      }).join('\n');
      await _ui.copy(text,'📋 디버그 로그 복사됨');
    }catch(e){}
  }
};
</script>
